<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Happy Birthday Babyy 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Pinyon+Script&family=Nothing+You+Could+Do&display=swap" rel="stylesheet">

<!-- the song — just put mann mera.mp3 in the same folder as this file -->
<audio id="song" loop preload="auto">
  <source src="mann mera.mp3" type="audio/mpeg">
</audio>
 
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#04000f; font-family:'Kalam', cursive; }

/* ── custom cursor ── */
#cursor {
  position:fixed; pointer-events:none; z-index:9999;
  width:14px; height:14px; border-radius:50%;
  background:radial-gradient(circle, #e879f9, #7c3aed);
  box-shadow:0 0 12px #e879f9, 0 0 24px #7c3aed;
  transform:translate(-50%,-50%);
  transition:transform .06s;
}

/* ── canvases ── */
#bgCanvas, #trailCanvas {
  position:fixed; inset:0; pointer-events:none;
}
#bgCanvas  { z-index:0; }
#trailCanvas { z-index:1; }

/* ── floating particles ── */
.fp, .fe {
  position:fixed; pointer-events:none; z-index:8000;
}
.fp {
  width:7px; height:7px; border-radius:50%;
  animation:fpAnim var(--d, .8s) ease-out forwards;
}
@keyframes fpAnim {
  from { transform:translate(0,0); opacity:1; }
  to   { transform:translate(var(--x), var(--y)); opacity:0; }
}
.fe {
  font-size:1.4rem;
  animation:feAnim 1.5s ease-out forwards;
}
@keyframes feAnim {
  0%   { transform:translate(0,0) scale(.3) rotate(0deg); opacity:1; }
  55%  { transform:translate(var(--x),var(--y)) scale(1.3) rotate(180deg); opacity:1; }
  100% { transform:translate(calc(var(--x)*1.7), calc(var(--y)*1.7 - 85px)) scale(.1) rotate(360deg); opacity:0; }
}

/* music hidden — plays silently in background */

/* ═══════════════════════════
   SCREEN 1 — GIFT BOX
═══════════════════════════ */
#S1 {
  position:fixed; inset:0; z-index:100;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:radial-gradient(ellipse at 50% 50%, #1a0060 0%, #07001f 75%);
  transition:opacity 1.1s ease;
}
#S1.out { opacity:0; pointer-events:none; }

.s1-label {
  font-family:'Pinyon Script', cursive;
  font-size:clamp(1rem, 3vw, 1.5rem);
  color:#d8b4fe; margin-bottom:.5rem;
  text-shadow:0 0 25px #a855f7, 0 0 50px #7c3aed;
  animation:fadeDown .7s ease both;
}
.s1-name {
  font-family:'Kalam', cursive; font-weight:700;
  font-size:clamp(1.1rem, 3.5vw, 1.8rem);
  color:#fff; text-align:center; line-height:1.6; margin-bottom:2.8rem;
  text-shadow:0 0 35px #a855f7, 0 0 70px #7c3aed;
  animation:fadeDown .7s .12s ease both;
}
.s1-name span { color:#fde68a; text-shadow:0 0 25px #fbbf24; }
@keyframes fadeDown {
  from { opacity:0; transform:translateY(-16px); }
  to   { opacity:1; transform:none; }
}

/* the gift box */
#giftBox {
  position:relative;
  width:clamp(155px, 34vw, 215px);
  cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none;
  animation:boxFloat 3s ease-in-out infinite;
  filter:drop-shadow(0 0 55px #a855f7) drop-shadow(0 0 100px #7c3aed60) drop-shadow(0 20px 40px #00000085);
}
@keyframes boxFloat {
  0%,100% { transform:translateY(0) rotate(-.4deg); }
  50%     { transform:translateY(-18px) rotate(.4deg); }
}
#giftBox.popped { animation:boxPop .5s ease forwards; }
@keyframes boxPop {
  0%   { transform:scale(1); }
  40%  { transform:scale(1.1); }
  100% { transform:scale(1) translateY(-210px); opacity:0; }
}

#bow {
  position:absolute; top:-26px; left:50%; transform:translateX(-50%);
  font-size:3rem; pointer-events:none;
  filter:drop-shadow(0 0 10px #fbbf24);
  animation:bowWig 2.5s ease-in-out infinite;
}
@keyframes bowWig {
  0%,100% { transform:translateX(-50%) rotate(-7deg) scale(1); }
  50%     { transform:translateX(-50%) rotate(7deg)  scale(1.07); }
}

/* orbit ring around box */
#orbit { position:absolute; inset:-55px; pointer-events:none; }
#orbit i {
  position:absolute; top:50%; left:50%;
  font-style:normal; animation:orbSpin linear infinite;
}
@keyframes orbSpin {
  from { transform:rotate(var(--a)) translateX(var(--r)) rotate(calc(-1 * var(--a))); }
  to   { transform:rotate(calc(var(--a) + 360deg)) translateX(var(--r)) rotate(calc(-1 * (var(--a) + 360deg))); }
}

.tap-hint {
  margin-top:2rem; font-size:clamp(.9rem, 2.5vw, 1.2rem);
  color:#c4b5fd; letter-spacing:.04em;
  text-shadow:0 0 15px #a855f7;
  animation:hintPulse 2s ease-in-out infinite;
}
@keyframes hintPulse {
  0%,100% { opacity:.6; transform:scale(.97); }
  50%     { opacity:1;  transform:scale(1.03); }
}

/* ═══════════════════════════
   WARP FLASH
═══════════════════════════ */
#warp {
  position:fixed; inset:0; z-index:200;
  display:none; align-items:center; justify-content:center;
  background:radial-gradient(circle, #160055 0%, #04000f 100%);
}
#warp.on { display:flex; }
.warp-text {
  font-family:'Kalam', cursive; font-weight:700;
  font-size:clamp(1.5rem, 6vw, 3.5rem);
  color:#fff; text-align:center; line-height:1.4;
  text-shadow:0 0 40px #e879f9, 0 0 80px #7c3aed;
  animation:warpIn 2.8s ease both;
}
@keyframes warpIn {
  0%   { opacity:0; transform:scale(3.5); letter-spacing:.5em; }
  35%  { opacity:1; transform:scale(1);   letter-spacing:.08em; }
  80%  { opacity:1; }
  100% { opacity:0; transform:scale(.4); }
}

/* ═══════════════════════════
   SCREEN 2 — SPELL WORLD
═══════════════════════════ */
#S2 { position:fixed; inset:0; z-index:50; display:none; overflow:hidden; }
#S2.on { display:block; }

#scrollWrap {
  position:absolute; inset:0; overflow-y:auto; overflow-x:hidden;
  padding-bottom:80px; /* so music bar doesn't cover content */
}
#scrollWrap::-webkit-scrollbar { width:2px; }
#scrollWrap::-webkit-scrollbar-thumb { background:#7c3aed40; border-radius:2px; }

/* hero section */
.hero {
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; padding:2rem; position:relative;
}
.hero-tag {
  font-size:clamp(.65rem, 1.8vw, .82rem);
  color:#a78bfa; letter-spacing:.22em; text-transform:uppercase;
  margin-bottom:1rem; text-shadow:0 0 18px #9333ea;
  animation:glowPulse 2.2s ease-in-out infinite alternate;
}
@keyframes glowPulse {
  from { text-shadow:0 0 10px #9333ea; }
  to   { text-shadow:0 0 28px #9333ea, 0 0 55px #9333ea70; }
}
.hero-hb {
  font-family:'Kalam', cursive; font-weight:700;
  font-size:clamp(2rem, 7vw, 4.8rem); line-height:1.15;
  background:linear-gradient(120deg, #fde68a, #f472b6, #a78bfa, #38bdf8, #fde68a);
  background-size:300%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:gradMove 4s linear infinite;
  filter:drop-shadow(0 0 22px #e879f935);
}
@keyframes gradMove {
  0%   { background-position:0%; }
  100% { background-position:300%; }
}
.hero-name {
  font-family:'Pinyon Script', cursive;
  font-size:clamp(2rem, 8vw, 5rem); color:#fde68a;
  text-shadow:0 0 22px #fbbf2465;
  margin:.2rem 0 2rem;
  animation:nameFloat 4s ease-in-out infinite alternate;
}
@keyframes nameFloat {
  from { transform:translateY(0); }
  to   { transform:translateY(-12px); }
}

/* cauldron */
.cauldron-wrap {
  position:relative; width:clamp(170px, 38vw, 250px); margin:0 auto;
}
.cauldron-wrap svg {
  width:100%; filter:drop-shadow(0 0 60px #a855f7) drop-shadow(0 0 120px #7c3aed50);
}
.liq-shimmer { animation:liqShim 2s ease-in-out infinite alternate; }
@keyframes liqShim { from{opacity:.65} to{opacity:1} }

/* smoke rings rising from cauldron */
.smoke-ring {
  position:absolute; left:50%; border-radius:50%;
  border:2px solid #e879f9; pointer-events:none;
  animation:smokeUp ease-out infinite;
}
@keyframes smokeUp {
  0%   { transform:translateX(-50%) translateY(0) scale(.3);       opacity:1;  border-color:#f472b6; }
  100% { transform:translateX(-50%) translateY(-105px) scale(2.3); opacity:0;  border-color:#a855f7; }
}

.scroll-hint {
  margin-top:2rem; font-size:clamp(.85rem, 2.5vw, 1.2rem);
  color:#c4b5fd; text-shadow:0 0 12px #a855f7;
  animation:scrollBob 2.5s ease-in-out infinite;
}
@keyframes scrollBob {
  0%,100% { transform:translateY(0); opacity:.7; }
  50%     { transform:translateY(8px); opacity:1; }
}

/* potions section */
.potions-section { padding:2rem 1rem 1rem; max-width:980px; margin:0 auto; }
.section-label {
  font-size:clamp(.72rem, 2vw, .88rem); font-style:italic; font-weight:300;
  color:#c4b5fd; letter-spacing:.18em;
  text-align:center; margin-bottom:2.5rem;
  text-shadow:0 0 12px #a855f750;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(min(260px, 88vw), 1fr));
  gap:1.4rem;
}

/* ── potion card ── */
.pcard {
  position:relative; border-radius:22px; overflow:hidden; cursor:pointer;
  background:linear-gradient(145deg, #150045, #220060);
  border:1px solid rgba(180,100,255,.18);
  padding:1.8rem 1.3rem 1.5rem;
  transition:transform .35s cubic-bezier(.34,1.4,.64,1), box-shadow .35s;
  -webkit-tap-highlight-color:transparent;
}
.pcard::before {
  content:''; position:absolute; inset:-2px; border-radius:24px; z-index:-1;
  background:linear-gradient(135deg, var(--c1), var(--c2), var(--c1));
  background-size:300%; animation:borderSpin 4s linear infinite;
  opacity:0; transition:opacity .35s;
}
@keyframes borderSpin { 0%{background-position:0%} 100%{background-position:300%} }
.pcard:hover::before, .pcard.lit::before { opacity:1; }
.pcard:hover, .pcard.lit {
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 22px 55px var(--sha, #9333ea40);
}

.card-inner-glow {
  position:absolute; top:-45px; left:50%; transform:translateX(-50%);
  width:170px; height:170px; border-radius:50%;
  background:radial-gradient(circle, var(--c1) 0%, transparent 70%);
  pointer-events:none; opacity:.22; transition:opacity .35s;
}
.pcard:hover .card-inner-glow, .pcard.lit .card-inner-glow { opacity:.45; }

/* bottle inside card */
.bottle-wrap {
  display:flex; justify-content:center; margin-bottom:1rem;
}
.bottle-wrap svg {
  width:clamp(46px, 9.5vw, 64px);
  animation:bottleGlow 3s ease-in-out infinite alternate;
}
@keyframes bottleGlow {
  from { filter:drop-shadow(0 0 16px var(--c1)) drop-shadow(0 4px 8px #00000065); }
  to   { filter:drop-shadow(0 0 38px var(--c1)) drop-shadow(0 0 60px var(--c1)40) drop-shadow(0 7px 16px #00000055); }
}

.card-num  {
  font-size:.66rem; color:var(--c1); letter-spacing:.14em;
  text-transform:uppercase; text-align:center; margin-bottom:.3rem; opacity:1;
  text-shadow:0 0 10px var(--c1);
}
.card-name {
  font-weight:700; font-size:clamp(.86rem, 2vw, .98rem);
  color:#fff; text-align:center; line-height:1.3; margin-bottom:.32rem;
  text-shadow:0 0 18px var(--c1), 0 0 35px var(--c1)60;
}
.card-mood {
  font-weight:300; font-style:italic;
  font-size:clamp(.76rem, 1.8vw, .86rem);
  color:var(--c1); text-align:center; margin-bottom:1rem; opacity:1;
  text-shadow:0 0 10px var(--c1)80;
}
.card-btn {
  display:block; width:100%; padding:.58rem; border:none; border-radius:50px;
  background:linear-gradient(135deg, var(--c1), var(--c2));
  font-family:'Kalam', cursive; font-size:.8rem; letter-spacing:.04em;
  color:#fff; cursor:pointer; box-shadow:0 5px 22px var(--sha), 0 0 30px var(--sha);
  transition:transform .2s, filter .2s; -webkit-tap-highlight-color:transparent;
}
.card-btn:hover, .card-btn:active { transform:scale(1.05); filter:brightness(1.25); }

/* bottom seal */
.bottom-seal {
  min-height:50vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; padding:3rem 2rem;
}
.seal-heart {
  font-size:clamp(3rem, 10vw, 5rem);
  animation:heartBeat 1.5s ease-in-out infinite;
  filter:drop-shadow(0 0 40px #f472b6) drop-shadow(0 0 80px #a855f7) drop-shadow(0 0 120px #7c3aed50);
}
@keyframes heartBeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.14)} }
.seal-words {
  font-family:'Pinyon Script', cursive;
  font-size:clamp(1.4rem, 5vw, 2.8rem); color:#fde68a;
  text-shadow:0 0 25px #fbbf24, 0 0 50px #fbbf2460; margin-top:1rem; line-height:1.5;
}
.seal-sub {
  font-weight:300; font-style:italic;
  font-size:clamp(.7rem, 2vw, .86rem);
  color:#c4b5fd; margin-top:.7rem; letter-spacing:.06em;
  text-shadow:0 0 10px #a855f760;
}

/* ═══════════════════════════
   MODAL
═══════════════════════════ */
#modal {
  position:fixed; inset:0; z-index:500;
  display:flex; align-items:center; justify-content:center; padding:1rem;
  background:#000000d2; backdrop-filter:blur(18px);
  opacity:0; pointer-events:none; transition:opacity .35s;
}
#modal.on { opacity:1; pointer-events:all; }

.modal-card {
  position:relative; max-width:460px; width:100%;
  max-height:87vh; overflow-y:auto;
  background:linear-gradient(150deg, #140040, #220060, #140040);
  border-radius:22px;
  padding:clamp(1.4rem, 4vw, 2.4rem) clamp(1.3rem, 4vw, 2.4rem);
  box-shadow:0 0 100px var(--mc, #9333ea)60, 0 30px 75px #00000090;
  transform:scale(.82) translateY(35px);
  transition:transform .45s cubic-bezier(.34,1.56,.64,1);
}
#modal.on .modal-card { transform:scale(1) translateY(0); }
.modal-card::-webkit-scrollbar { width:2px; }
.modal-card::-webkit-scrollbar-thumb { background:var(--mc, #9333ea); border-radius:2px; }
.modal-card::before {
  content:''; position:absolute; inset:-2px; border-radius:24px; z-index:-1;
  background:linear-gradient(135deg, var(--mc,#9333ea), #f472b6, var(--mc,#9333ea));
  background-size:300%; animation:borderSpin 3s linear infinite; opacity:.85;
}

.modal-close {
  position:absolute; top:.85rem; right:.85rem;
  width:30px; height:30px; border-radius:50%;
  background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3);
  color:#fff; cursor:pointer; font-size:.85rem; font-family:sans-serif;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s; -webkit-tap-highlight-color:transparent;
}
.modal-close:hover { background:rgba(255,255,255,.3); }

.modal-icon {
  font-size:3rem; display:block; text-align:center; margin-bottom:.45rem;
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn {
  0%   { transform:scale(0) rotate(-25deg); }
  100% { transform:scale(1) rotate(0deg); }
}
.modal-title {
  font-weight:700; font-size:clamp(.92rem, 3vw, 1.18rem);
  color:#fff; text-align:center; line-height:1.3; margin-bottom:.22rem;
  text-shadow:0 0 22px var(--mc, #9333ea), 0 0 45px var(--mc, #9333ea)60;
}
.modal-from {
  font-weight:300; font-style:italic; font-size:.82rem;
  color:var(--mc, #9333ea); text-align:center; opacity:1;
  text-shadow:0 0 12px var(--mc,#9333ea)80;
  margin-bottom:1.1rem; padding-bottom:.85rem;
  border-bottom:1px solid rgba(255,255,255,.12);
}
.modal-body {
  font-weight:300; font-size:clamp(.9rem, 2.4vw, .98rem);
  color:#f0e6ff; line-height:2.1;
}
.modal-body p { margin-bottom:.88rem; }
.modal-body .hi { color:#fde68a; font-weight:400; text-shadow:0 0 10px #fbbf2460; }
.modal-body .ro { color:#f9a8d4; font-style:italic; text-shadow:0 0 10px #f472b650; }

/* signature — only on last potion */
.modal-sign {
  margin-top:1.3rem; padding-top:.85rem;
  border-top:1px solid rgba(255,255,255,.12);
  text-align:right;
}
.modal-sig {
  font-family:'Nothing You Could Do', cursive;
  font-size:1.9rem; color:var(--mc, #9333ea); line-height:1.4;
  text-shadow:0 0 20px var(--mc, #9333ea), 0 0 40px var(--mc,#9333ea)60;
}
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="bgCanvas"></canvas>
<canvas id="trailCanvas"></canvas>

<!-- ═══ S1: GIFT BOX ═══ -->
<div id="S1">
  <p class="s1-label">✦ a little something for you ✦</p>
  <p class="s1-name">for my love 🥺</p>

  <div id="giftBox">
    <div id="orbit"></div>
    <div id="bow">🎀</div>
    <canvas id="boxCanvas" width="220" height="200" style="display:block;width:100%;"></canvas>
  </div>

  <p class="tap-hint">✦ tap the box ✦</p>
</div>

<!-- ═══ WARP ═══ -->
<div id="warp">
  <p class="warp-text">Happy Birthday<br> Babyyy 🌙</p>
</div>

<!-- ═══ S2: SPELL WORLD ═══ -->
<div id="S2">
  <div id="scrollWrap">

    <div class="hero">
      <p class="hero-tag">✦ the book of love potions ✦</p>
      <h1 class="hero-hb">Happy Birthday</h1> 
      <p class="hero-name"> Myyy Loveeee</p>

      <div class="cauldron-wrap">
        <!-- smoke rings -->
        <div class="smoke-ring" style="width:46px;height:23px;top:4%;animation-duration:2.2s;"></div>
        <div class="smoke-ring" style="width:36px;height:18px;top:6%;animation-duration:2.9s;animation-delay:.6s;"></div>
        <div class="smoke-ring" style="width:28px;height:14px;top:3%;animation-duration:2s;animation-delay:1.25s;"></div>

        <svg viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="cBody" cx="50%" cy="70%">
              <stop offset="0%" stop-color="#4c1d95"/>
              <stop offset="100%" stop-color="#1a004a"/>
            </radialGradient>
            <radialGradient id="cLiquid" cx="50%" cy="30%">
              <stop offset="0%" stop-color="#f472b6"/>
              <stop offset="50%" stop-color="#a855f7"/>
              <stop offset="100%" stop-color="#6d28d9" stop-opacity=".3"/>
            </radialGradient>
            <filter id="gblur"><feGaussianBlur stdDeviation="6"/></filter>
          </defs>
          <!-- floor glow -->
          <ellipse cx="120" cy="187" rx="76" ry="10" fill="#9333ea" opacity=".55" filter="url(#gblur)"/>
          <!-- legs -->
          <rect x="73"  y="160" width="13" height="28" rx="5" fill="#2a0055"/>
          <rect x="154" y="160" width="13" height="28" rx="5" fill="#2a0055"/>
          <!-- body -->
          <ellipse cx="120" cy="118" rx="87" ry="61" fill="url(#cBody)"/>
          <!-- liquid surface glow -->
          <ellipse cx="120" cy="82" rx="65" ry="28" fill="#e879f9" opacity=".25" filter="url(#gblur)"/>
          <!-- liquid -->
          <ellipse cx="120" cy="80" rx="70" ry="30" fill="url(#cLiquid)"/>
          <!-- shimmer on liquid -->
          <ellipse cx="100" cy="73" rx="22" ry="8" fill="#f9a8d4" opacity=".7" class="liq-shimmer"/>
          <!-- rim -->
          <ellipse cx="120" cy="80" rx="84" ry="18" fill="none" stroke="#c084fc" stroke-width="5" opacity=".9"/>
          <ellipse cx="120" cy="80" rx="84" ry="18" fill="none" stroke="#f472b6" stroke-width="2" opacity=".6"/>
          <!-- handles -->
          <path d="M34 116 Q18 90 34 64" fill="none" stroke="#6d28d9" stroke-width="10" stroke-linecap="round"/>
          <path d="M206 116 Q222 90 206 64" fill="none" stroke="#6d28d9" stroke-width="10" stroke-linecap="round"/>
          <!-- floating sparkles -->
          <text x="88"  y="38" font-size="15" fill="#fde68a" opacity="1">✦</text>
          <text x="130" y="27" font-size="11" fill="#f472b6" opacity="1">✧</text>
          <text x="152" y="44" font-size="13" fill="#a78bfa" opacity="1">✦</text>
          <text x="66"  y="48" font-size="9"  fill="#e879f9" opacity=".9">✧</text>
        </svg>
      </div>

      <p class="scroll-hint">✦ scroll down ✦</p>
    </div>

    <div class="potions-section">
      <p class="section-label">six love potions, brewed just for you by Kajal 🌙</p>
      <div class="grid" id="potionsGrid"></div>
    </div>

    <div class="bottom-seal">
      <div class="seal-heart">💖</div>
      <p class="seal-words">you are my<br>favourite magic</p>
      <p class="seal-sub">sealed with stardust &amp; forever love — Kajal 🌙</p>
    </div>

  </div>
</div>

<!-- ═══ MODAL ═══ -->
<div id="modal">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
/* ─── cursor ─── */
const cur = document.getElementById('cursor');
let mx = innerWidth/2, my = innerHeight/2;
const moveCursor = (x, y) => { mx=x; my=y; cur.style.left=x+'px'; cur.style.top=y+'px'; };
document.addEventListener('mousemove', e => moveCursor(e.clientX, e.clientY));
document.addEventListener('touchmove', e => moveCursor(e.touches[0].clientX, e.touches[0].clientY), {passive:true});

/* ─── canvases ─── */
const bgC  = document.getElementById('bgCanvas'),   bgX  = bgC.getContext('2d');
const trC  = document.getElementById('trailCanvas'), trX  = trC.getContext('2d');
function resize() { bgC.width=trC.width=innerWidth; bgC.height=trC.height=innerHeight; }
resize(); addEventListener('resize', resize);

/* stars */
const stars = Array.from({length:240}, () => ({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  r:.3+Math.random()*1.6, a:Math.random(), da:.003+Math.random()*.011,
  c:['#fff','#c4b5fd','#f9a8d4','#fde68a'][Math.floor(Math.random()*4)]
}));
(function tick(){
  bgX.clearRect(0,0,bgC.width,bgC.height);
  stars.forEach(s => {
    s.a += s.da; if(s.a>1||s.a<0) s.da*=-1;
    bgX.globalAlpha=s.a*.98; bgX.fillStyle=s.c;
    bgX.beginPath(); bgX.arc(s.x,s.y,s.r,0,Math.PI*2); bgX.fill();
  });
  bgX.globalAlpha=1; requestAnimationFrame(tick);
})();

/* trail */
const trail = [];
const addT = (x,y) => { trail.push({x,y,life:1,c:['#e879f9','#a78bfa','#f472b6','#fde68a'][Math.floor(Math.random()*4)]}); if(trail.length>28) trail.shift(); };
document.addEventListener('mousemove', e=>addT(e.clientX,e.clientY));
document.addEventListener('touchmove', e=>addT(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
(function trailTick(){
  trX.clearRect(0,0,trC.width,trC.height);
  trail.forEach((t,i) => {
    t.life -= .046; if(t.life<0) return;
    const r = (i/trail.length)*5*t.life;
    trX.globalAlpha=t.life*.6; trX.fillStyle=t.c;
    trX.shadowBlur=7; trX.shadowColor=t.c;
    trX.beginPath(); trX.arc(t.x,t.y,r,0,Math.PI*2); trX.fill();
  });
  trX.globalAlpha=1; trX.shadowBlur=0; requestAnimationFrame(trailTick);
})();

/* ─── box canvas ─── */
const bCvs = document.getElementById('boxCanvas'), bCtx = bCvs.getContext('2d');
let lidAngle = 0, lidGoing = false;
function rr(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r); c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h); c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r); c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath(); }
function drawBox(){
  bCtx.clearRect(0,0,220,200);
  const body = bCtx.createLinearGradient(0,80,220,200);
  body.addColorStop(0,'#4a007a'); body.addColorStop(.5,'#7c3aed'); body.addColorStop(1,'#a855f7');
  const rib = bCtx.createLinearGradient(0,0,0,200);
  rib.addColorStop(0,'#fde68a'); rib.addColorStop(.5,'#fffaaa'); rib.addColorStop(1,'#fde68a');
  bCtx.fillStyle=body; rr(bCtx,15,82,190,112,10); bCtx.fill();
  bCtx.fillStyle=rib;  rr(bCtx,100,82,20,112,4); bCtx.fill();
  bCtx.fillStyle=rib;  rr(bCtx,15,128,190,18,4); bCtx.fill();
  bCtx.globalAlpha=.1; bCtx.fillStyle='#fff';
  bCtx.beginPath(); bCtx.ellipse(68,100,24,8,0,0,Math.PI*2); bCtx.fill();
  bCtx.globalAlpha=1;
  /* lid */
  bCtx.save();
  bCtx.translate(110,82); bCtx.transform(1,0,0,Math.cos(lidAngle),0,0); bCtx.translate(-110,-82);
  const lid = bCtx.createLinearGradient(0,24,220,80);
  lid.addColorStop(0,'#3a0068'); lid.addColorStop(.5,'#6d28d9'); lid.addColorStop(1,'#8b5cf6');
  bCtx.fillStyle=lid; rr(bCtx,5,24,210,58,10); bCtx.fill();
  bCtx.fillStyle=rib; rr(bCtx,100,24,20,58,4); bCtx.fill();
  bCtx.globalAlpha=.12; bCtx.fillStyle='#fff';
  bCtx.beginPath(); bCtx.ellipse(74,42,23,8,0,0,Math.PI*2); bCtx.fill();
  bCtx.globalAlpha=1;
  bCtx.restore();
  bCtx.font='12px serif'; bCtx.fillStyle='#fde68a'; bCtx.globalAlpha=.52;
  bCtx.fillText('✦',28,158); bCtx.fillText('✧',166,116);
  bCtx.globalAlpha=1;
  if(lidGoing && lidAngle < Math.PI*.72){ lidAngle+=.04; requestAnimationFrame(drawBox); }
  else if(!lidGoing) requestAnimationFrame(drawBox);
}
drawBox();

/* ─── orbit ─── */
['✦','✧','💫','🌟','✨','💜','🔮','⭐','💗','✦'].forEach((e,i) => {
  const s = document.createElement('i'); s.textContent=e;
  s.style.cssText=`--a:${i/10*360}deg;--r:${100+Math.floor(i/5)*16}px;animation-duration:${7+i*.45}s;font-size:${.7+Math.random()*.42}rem;filter:drop-shadow(0 0 5px #b06eff);`;
  document.getElementById('orbit').appendChild(s);
});

/* ─── particles ─── */
const pColors = ['#a78bfa','#fde68a','#f472b6','#7c3aed','#e879f9','#fff','#c084fc','#fb7185','#38bdf8'];
const eList   = ['💖','✨','🌟','💫','🔮','🌸','💜','⭐','✦','🌙','💗','🎇','✧'];
function burst(cx,cy,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, d=40+Math.random()*200;
    const el=document.createElement('div'); el.className='fp';
    const c=pColors[i%pColors.length];
    el.style.cssText=`left:${cx}px;top:${cy}px;background:${c};box-shadow:0 0 7px ${c};--x:${Math.cos(a)*d}px;--y:${Math.sin(a)*d}px;--d:${.5+Math.random()*1}s;animation-delay:${Math.random()*.17}s`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),1700);
  }
}
function eBurst(cx,cy,n){
  for(let i=0;i<(n||14);i++){
    const a=Math.random()*Math.PI*2, d=55+Math.random()*160;
    const el=document.createElement('div'); el.className='fe';
    el.textContent=eList[Math.floor(Math.random()*eList.length)];
    el.style.cssText=`left:${cx}px;top:${cy}px;--x:${Math.cos(a)*d}px;--y:${Math.sin(a)*d}px;animation-delay:${Math.random()*.2}s`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),2000);
  }
}

/* ─── music — silent autoplay, no UI ─── */
const song = document.getElementById('song');
function tryPlay(){ song.play().catch(()=>{}); }


/* ─── open box ─── */
let boxDone = false;
function openBox(){
  if(boxDone) return; boxDone=true;
  lidGoing=true; drawBox();
  tryPlay(); /* start song when box opens */
  const b = document.getElementById('giftBox');
  b.style.animation='none';
  const r=b.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
  burst(cx,cy,140); eBurst(cx,cy,20);
  setTimeout(()=>{ burst(cx-95,cy-55,60); eBurst(cx+75,cy-40,12); },260);
  setTimeout(()=>{ burst(cx+95,cy-70,60); eBurst(innerWidth*.5,innerHeight*.3,15); },500);
  setTimeout(()=>{ b.classList.add('popped'); },800);
  setTimeout(()=>{
    document.getElementById('S1').classList.add('out');
    const w=document.getElementById('warp'); w.classList.add('on');
    burst(innerWidth/2,innerHeight/2,180); eBurst(innerWidth/2,innerHeight/2,25);
  },900);
  setTimeout(()=>{
    document.getElementById('warp').classList.remove('on');
    document.getElementById('S1').style.display='none';
    document.getElementById('S2').classList.add('on');
    spawnOrbs(); buildGrid();
    burst(innerWidth/2,innerHeight*.33,90); eBurst(innerWidth/2,innerHeight*.22,16);
  },3000);
}
document.getElementById('S1').addEventListener('click', openBox, {passive:true});
document.getElementById('S1').addEventListener('touchend', e=>{ e.preventDefault(); openBox(); },{passive:false});

/* ─── ambient orbs ─── */
function spawnOrbs(){
  const s2=document.getElementById('S2');
  [{c:'#7c3aed18',w:500,l:'4%', t:'8%', ox:'44px', oy:'-36px',d:'9s'},
   {c:'#f472b614',w:420,l:'62%',t:'22%',ox:'-30px',oy:'40px', d:'11s'},
   {c:'#a855f712',w:540,l:'28%',t:'52%',ox:'36px', oy:'-30px',d:'13s'},
   {c:'#fde68a0f',w:370,l:'70%',t:'62%',ox:'-40px',oy:'36px', d:'8s'}
  ].forEach(o=>{
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;width:${o.w}px;height:${o.w}px;border-radius:50%;background:radial-gradient(circle,${o.c},transparent);left:${o.l};top:${o.t};pointer-events:none;z-index:1;mix-blend-mode:screen;animation:orbDrift ${o.d} ease-in-out infinite alternate;--ox:${o.ox};--oy:${o.oy};`;
    s2.appendChild(el);
  });
  const ks=document.createElement('style');
  ks.textContent='@keyframes orbDrift{from{transform:translate(0,0)}to{transform:translate(var(--ox),var(--oy))}}';
  document.head.appendChild(ks);
}

/* ─── build grid ─── */
function buildGrid(){
  const g = document.getElementById('potionsGrid');
  if(g.children.length) return;
  potions.forEach((p,i) => {
    const card = document.createElement('div');
    card.className='pcard';
    card.style.cssText=`--c1:${p.c1};--c2:${p.c2};--sha:${p.sha};`;
    const bsvg=`<svg viewBox="0 0 60 95" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="btl${i}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${p.c1}" stop-opacity=".3"/>
          <stop offset="100%" stop-color="${p.c1}"/>
        </linearGradient>
        <linearGradient id="lqd${i}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${p.lc2}"/>
          <stop offset="100%" stop-color="${p.lc}"/>
        </linearGradient>
        <filter id="gf${i}"><feGaussianBlur stdDeviation="2.5"/></filter>
      </defs>
      <ellipse cx="30" cy="70" rx="20" ry="20" fill="${p.c1}" opacity=".16" filter="url(#gf${i})"/>
      <rect x="22" y="3"  width="16" height="13" rx="3" fill="#c8a46e"/>
      <rect x="24" y="3"  width="4"  height="13" rx="2" fill="#e8c080" opacity=".42"/>
      <rect x="24" y="14" width="12" height="18" rx="4" fill="url(#btl${i})"/>
      <ellipse cx="30" cy="65" rx="22" ry="27" fill="url(#btl${i})"/>
      <ellipse cx="30" cy="70" rx="18" ry="21" fill="url(#lqd${i})" opacity=".8" class="liq-shimmer"/>
      <ellipse cx="22" cy="54" rx="5"  ry="11" fill="white" opacity=".19"/>
      <circle  cx="24" cy="68" r="2.7" fill="white" opacity=".26"/>
      <circle  cx="35" cy="74" r="1.8" fill="white" opacity=".18"/>
      <text x="23" y="68" font-size="11" fill="white" opacity=".68">✦</text>
    </svg>`;
    card.innerHTML=`<div class="card-inner-glow"></div>
      <div class="bottle-wrap" style="--c1:${p.c1}">${bsvg}</div>
      <div class="card-num">Potion ${p.num}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-mood">${p.mood}</div>
      <button class="card-btn" data-i="${i}">✦ uncork ✦</button>`;
    g.appendChild(card);
  });
  g.addEventListener('click', e=>{
    const b=e.target.closest('[data-i]');
    if(b) openPotion(parseInt(b.dataset.i), b);
  });
  g.querySelectorAll('.pcard').forEach(c=>{
    c.addEventListener('touchstart', ()=>c.classList.add('lit'), {passive:true});
    c.addEventListener('touchend',   ()=>setTimeout(()=>c.classList.remove('lit'),360), {passive:true});
  });
}

/* ─── open potion ─── */
function openPotion(i, el){
  const p=potions[i];
  const r=el.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
  burst(cx,cy,60); eBurst(cx,cy,14);
  const mc=document.getElementById('modalCard');
  mc.style.setProperty('--mc', p.mc);
  document.getElementById('modalContent').innerHTML=`
    <span class="modal-icon">${p.mIcon}</span>
    <div class="modal-title">${p.mTitle}</div>
    <div class="modal-from">✦ from your love, with love ✦</div>
    <div class="modal-body">${p.body}</div>
    ${i===5 ? `<div class="modal-sign"><div style="font-size:1.1rem;margin-bottom:.28rem">🌹✨💜</div><div class="modal-sig">yours always,<br>YOUR LOVE 💖</div></div>` : ''}`;
  document.getElementById('modal').classList.add('on');
  document.body.style.overflow='hidden';
}

/* close modal */
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e=>{
  if(e.target===document.getElementById('modal')) closeModal();
});
document.addEventListener('touchend', e=>{
  if(document.getElementById('modal').classList.contains('on') && e.target===document.getElementById('modal')) closeModal();
},{passive:true});
function closeModal(){
  document.getElementById('modal').classList.remove('on');
  document.body.style.overflow='';
}

/* scroll sparkles */
document.getElementById('scrollWrap').addEventListener('scroll', ()=>{
  if(Math.random()>.72) eBurst(Math.random()*innerWidth, Math.random()*innerHeight*.5, 4);
},{passive:true});

/* periodic ambient */
setInterval(()=>{
  if(!document.getElementById('S2').classList.contains('on')) return;
  burst(Math.random()*innerWidth, Math.random()*innerHeight, 7);
}, 3200);
</script>
